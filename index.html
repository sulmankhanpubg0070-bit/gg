<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, World!</title>
    <!-- Live font loading for pristine typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN for quick setup and responsive classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center font-sans selection:bg-amber-150 selection:text-amber-950 overflow-hidden">
    <!-- Clean Minimalist Background Container -->
    <main class="w-full max-w-md p-8 md:p-12 text-center fade-in opacity-0">
      
      <!-- Visual Greeting Accent -->
      <div class="mx-auto w-12 h-12 rounded-2xl bg-amber-100 flex items-center justify-center border border-amber-200/50 shadow-xs mb-6">
        <span class="text-xl">👋</span>
      </div>

      <!-- Polished Display Greeting -->
      <h1 class="text-4xl md:text-5xl font-bold font-display tracking-tight text-slate-900 mb-3">
        Hello!
      </h1>
      
      <p class="text-xs md:text-sm text-slate-500 font-normal leading-relaxed max-w-xs mx-auto">
        Your self-contained static page is perfectly built, lightweight, and ready to deploy instantly anywhere.
      </p>

      <!-- Humble separator -->
      <div class="mt-8 pt-6 border-t border-slate-200/60 flex items-center justify-center gap-1.5">
        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
        <span class="text-5xs font-black font-mono text-slate-400 uppercase tracking-widest">
          ONLINE & READY
        </span>
      </div>

    </main>
  </body>
</html>
