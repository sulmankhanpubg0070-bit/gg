<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hamza Khan Family Tree</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Lucide Icons Support -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="header-shell">
      <header class="topbar">
        <div class="header-title" style="display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: -0.5px;">
          <div style="background: linear-gradient(135deg, rgba(163, 230, 53, 0.2) 0%, rgba(34, 197, 94, 0.2) 100%); border: 1px solid rgba(163, 230, 53, 0.3); padding: 5px; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(163, 230, 53, 0.15);">
            <i data-lucide="git-fork" style="width: 18px; height: 18px; color: #a3e635; transform: rotate(180deg);"></i>
          </div>
          <span style="font-size: 20px; background: linear-gradient(135deg, #ffffff 50%, #a3e635 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: system-ui, -apple-system, sans-serif;">Family Tree</span>
        </div>
      </header>

      <nav class="topnav" aria-label="Pages">
        <a class="nav-link active" href="./index.html"><i data-lucide="git-fork" style="width: 16px; height: 16px;"></i> Home</a>
        <a class="nav-link" href="./about.html"><i data-lucide="info" style="width: 16px; height: 16px;"></i> About</a>
        <a class="nav-link" href="./contact.html"><i data-lucide="mail" style="width: 16px; height: 16px;"></i> Contact</a>
      </nav>
    </div>

    <main class="container">
      <!-- High-Level Prominent Search Section -->
      <section class="search-hero" id="searchHero">
        <div class="search-hero-glow"></div>
        <h2>
          <i data-lucide="search" style="width: 18px; height: 18px; color: var(--accent);"></i>
          Quick Family Search
        </h2>
        <div class="search-box-container">
          <i data-lucide="search" style="width: 20px; height: 20px;"></i>
          <input id="searchInput" type="search" placeholder="Type a name to search and highlight members..." autocomplete="off" />
          <button id="searchClearBtn" class="clear-btn" type="button" title="Clear Search">
            <i data-lucide="x" style="width: 14px; height: 14px;"></i>
          </button>
        </div>
      </section>

      <section class="tree-wrap">
        <div id="treeRoot" class="tree" aria-label="Family tree"></div>
      </section>
    </main>

    <nav class="bottombar" aria-label="Menu">
      <div class="flex items-center gap-2 text-xs text-lime-400 font-bold tracking-wider uppercase pl-2 font-mono">
        <i data-lucide="git-fork" style="width: 14px; height: 14px;"></i> Active Tree View
      </div>

      <div class="spacer"></div>

      <div class="group" role="group" aria-label="Zoom">
        <button id="zoomOutBtn" class="btn btn-ghost btn-xs" type="button">-</button>
        <label class="zoom-inline">
          <span>Zoom</span>
          <input id="zoomRange" type="range" min="60" max="140" value="100" />
        </label>
        <button id="zoomInBtn" class="btn btn-ghost btn-xs" type="button">+</button>
        <button id="zoomResetBtn" class="btn btn-ghost btn-xs" type="button">Reset</button>
      </div>

      <button id="themeToggleBtn" class="btn btn-ghost" type="button">Theme</button>
      <button id="expandAllBtn" class="btn" type="button">Expand</button>
      <button id="collapseAllBtn" class="btn btn-ghost" type="button">Collapse</button>
    </nav>

    <div id="detailsModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Person details">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-card" role="document">
        <div class="modal-head">
          <div id="modalTitle" class="modal-title">Person details</div>
          <button id="closeModalBtn" class="btn btn-ghost btn-xs" type="button">Close</button>
        </div>
        <div id="details" class="details empty">Kisi person card par click karein.</div>
      </div>
    </div>

    <footer class="footer">
      <span>Designed with premium aesthetics by Hamza Khan. All rights reserved.</span>
    </footer>

    <script src="./site.js"></script>
    <script src="./app.js"></script>
    <script>
      // Render Lucide Icons dynamically
      lucide.createIcons();
    </script>
  </body>
</html>
