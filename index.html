<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sulman Khan Studio</title>
  
  <!-- CSS Support -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Beautiful luxurious fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Syne', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      overflow: hidden;
    }
    
    .display-hello {
      font-size: clamp(4rem, 18vw, 15rem);
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 800;
      text-transform: uppercase;
      animation: helloEntrance 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes helloEntrance {
      from {
        opacity: 0;
        transform: scale(0.95);
        filter: blur(15px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }
  </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center relative selection:bg-white selection:text-black">

  <!-- Subtle glow behind title -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] sm:w-[500px] h-[350px] sm:h-[500px] bg-lime-400/5 rounded-full blur-[100px] pointer-events-none"></div>

  <!-- Main and only content -->
  <main class="relative z-10 text-center select-none">
    <h1 class="display-hello text-white">
      Hello
    </h1>
  </main>

</body>
</html>
